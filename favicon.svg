<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- full-bleed cartoon baseball -->
  <circle cx="32" cy="32" r="30" fill="#ffffff" stroke="#0a0d12" stroke-width="2.5"/>

  <!-- red seams -->
  <path d="M14 9 Q3 32 14 55" fill="none" stroke="#e4002b" stroke-width="3.2" stroke-linecap="round"/>
  <path d="M50 9 Q61 32 50 55" fill="none" stroke="#e4002b" stroke-width="3.2" stroke-linecap="round"/>

  <!-- stitch ticks (left seam) -->
  <g stroke="#e4002b" stroke-width="2.4" stroke-linecap="round">
    <line x1="9" y1="15" x2="18" y2="18"/>
    <line x1="5.5" y1="23" x2="15" y2="25"/>
    <line x1="4.5" y1="32" x2="14.5" y2="32"/>
    <line x1="5.5" y1="41" x2="15" y2="39"/>
    <line x1="9" y1="49" x2="18" y2="46"/>
  </g>
  <!-- stitch ticks (right seam) -->
  <g stroke="#e4002b" stroke-width="2.4" stroke-linecap="round">
    <line x1="55" y1="15" x2="46" y2="18"/>
    <line x1="58.5" y1="23" x2="49" y2="25"/>
    <line x1="59.5" y1="32" x2="49.5" y2="32"/>
    <line x1="58.5" y1="41" x2="49" y2="39"/>
    <line x1="55" y1="49" x2="46" y2="46"/>
  </g>

  <!-- cartoon highlight -->
  <ellipse cx="23" cy="20" rx="7" ry="4" fill="#ffffff" opacity="0.9" transform="rotate(-30 23 20)"/>
</svg>
